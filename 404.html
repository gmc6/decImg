<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — decImg</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --surface: #0f0f0f;
            --border: #1a1a1a;
            --text-primary: #f0f0f0;
            --text-subtle: #555;
            --radius: 8px;
            --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            padding: 2.5rem 2.5rem 1.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.05s,
                transform 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.05s;
        }

        .card.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .code {
            font-size: 2rem;
            font-weight: 700;
        }

        .message {
            font-size: 0.8rem;
            color: var(--text-subtle);
            margin-top: 0.5rem;
        }

        .home {
            display: inline-block;
            margin-top: 2rem;
            font-size: 0.72rem;
            color: var(--text-subtle);
            text-decoration: none;
            transition: color var(--transition);
        }

        .home:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        .github-link {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 10;
            display: block;
            line-height: 0;
        }

        .github-link svg {
            fill: var(--text-subtle);
            transition: fill var(--transition);
        }

        .github-link:hover svg {
            fill: var(--text-primary);
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .card {
                padding: 1.5rem 1.5rem 1.25rem;
            }

            .github-link {
                bottom: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="card" id="card">
        <div class="code">404</div>
        <div class="message">This page doesn't exist.</div>
    </div>
    <a class="home" href="/">go home</a>
    <a class="github-link" href="https://github.com/gmc6/decImg" target="_blank" rel="noopener noreferrer"><svg
            width="20" height="20" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
                d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" />
        </svg></a>
    <script>
        document.getElementById('card').classList.add('is-visible');
    </script>
</body>

</html>
