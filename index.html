<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>decImg</title>
  <meta name="description" content="Convert Roblox Decal IDs to Image IDs instantly.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="google-site-verification" content="47jdk9JS_UyE9SH9ObMulmFUPW1kL2m2HmHkgv5gK3A" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: #1a1a1a;
      --border-hover: #2a2a2a;
      --accent: #e8ff47;
      --accent-dim: rgba(232, 255, 71, 0.08);
      --text-primary: #f0f0f0;
      --text-muted: #3a3a3a;
      --text-subtle: #555;
      --error: #ff4d4d;
      --error-dim: rgba(255, 77, 77, 0.08);
      --radius: 8px;
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.05s, transform 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.05s;
    }

    .card.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .header-wordmark {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text-primary);
    }

    .header-sub {
      font-size: 0.72rem;
      color: var(--text-subtle);
      letter-spacing: 0.08em;
      margin-top: 0.3rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }

    .input {
      display: block;
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-primary);
      caret-color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      user-select: text;
    }

    .input::placeholder {
      color: var(--text-muted);
    }

    .input:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
    }

    .input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.85rem;
      background: transparent;
      color: var(--text-primary);
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), transform var(--transition), opacity var(--transition);
    }

    .btn:hover:not(:disabled) {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.04);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.985);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .result-area {
      margin-top: 1.25rem;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity 0.22s cubic-bezier(0.4, 0, 0.2, 1), transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .result-area.is-active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .result-success {
      display: none;
      background: var(--accent-dim);
      border: 1px solid rgba(232, 255, 71, 0.15);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
      align-items: center;
      justify-content: space-between;
    }

    .result-success.is-visible {
      display: flex;
    }

    .result-success-inner {
      min-width: 0;
    }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--text-subtle);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .result-id {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      word-break: break-all;
      user-select: text;
    }

    .copy-btn {
      flex-shrink: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .copy-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--text-subtle);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke var(--transition);
    }

    .copy-btn:hover svg {
      stroke: var(--text-primary);
    }

    .copy-btn .icon-check {
      display: none;
    }

    .copy-btn.is-copied .icon-clip {
      display: none;
    }

    .copy-btn.is-copied .icon-check {
      display: block;
      stroke: var(--accent);
    }

    .result-error {
      display: none;
      background: var(--error-dim);
      border: 1px solid rgba(255, 77, 77, 0.15);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
      font-size: 0.82rem;
      color: var(--error);
    }

    .result-error.is-visible {
      display: block;
    }

    .result-error-x {
      margin-right: 0.4rem;
    }

    .about {
      max-width: 460px;
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--text-subtle);
      line-height: 1.7;
      text-align: center;
      opacity: 0;
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.2s;
    }

    .about.is-visible {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="card" id="card">
    <div class="header-wordmark">decImg</div>
    <div class="header-sub">Decal ID → Image ID</div>
    <hr class="divider">
    <form id="form">
      <input type="text" class="input" id="decal-input" placeholder="Decal ID" autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false">
      <button type="submit" class="btn" id="convert-btn">Convert</button>
    </form>
    <div class="result-area" id="result-area" aria-live="polite">
      <div class="result-success" id="result-success">
        <div class="result-success-inner">
          <div class="result-label">Image ID</div>
          <div class="result-id" id="result-id"></div>
        </div>
        <button type="button" class="copy-btn" id="copy-btn">
          <svg class="icon-clip" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          <svg class="icon-check" viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </button>
      </div>
      <div class="result-error" id="result-error"><span class="result-error-x">✕</span><span id="error-msg"></span>
      </div>
    </div>
  </div>
  <p class="about" id="about">Paste a Roblox Decal ID and get back the underlying Image ID. Useful for scripting, asset
    pipelines, or just figuring out what's behind a decal.</p>
  <script>
    (function () {
      var card = document.getElementById('card');
      var about = document.getElementById('about');
      var form = document.getElementById('form');
      var input = document.getElementById('decal-input');
      var btn = document.getElementById('convert-btn');
      var resultArea = document.getElementById('result-area');
      var resultSuccess = document.getElementById('result-success');
      var resultId = document.getElementById('result-id');
      var resultError = document.getElementById('result-error');
      var errorMsg = document.getElementById('error-msg');
      var copyBtn = document.getElementById('copy-btn');
      var copyTimeout;
      var loadingInterval;
      var loadingDots = 0;

      function setLoading(active) {
        input.disabled = active;
        btn.disabled = active;
        if (active) {
          resetResult();
          loadingDots = 0;
          btn.textContent = 'Converting';
          loadingInterval = setInterval(function () {
            loadingDots = (loadingDots + 1) % 4;
            btn.textContent = 'Converting' + '.'.repeat(loadingDots);
          }, 320);
        } else {
          clearInterval(loadingInterval);
          btn.textContent = 'Convert';
        }
      }

      function resetResult() {
        resultArea.classList.remove('is-active');
        resultSuccess.classList.remove('is-visible');
        resultError.classList.remove('is-visible');
      }

      function setResult(id) {
        resultId.textContent = id;
        resultSuccess.classList.add('is-visible');
        resultError.classList.remove('is-visible');
        resultArea.classList.add('is-active');
      }

      function setError(msg) {
        errorMsg.textContent = msg;
        resultError.classList.add('is-visible');
        resultSuccess.classList.remove('is-visible');
        resultArea.classList.add('is-active');
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand('copy') ? resolve() : reject();
          } catch (e) {
            reject(e);
          } finally {
            document.body.removeChild(ta);
          }
        });
      }

      copyBtn.addEventListener('click', function () {
        var text = resultId.textContent;
        if (!text) return;
        copyToClipboard(text).then(function () {
          clearTimeout(copyTimeout);
          copyBtn.classList.add('is-copied');
          copyTimeout = setTimeout(function () {
            copyBtn.classList.remove('is-copied');
          }, 1600);
        });
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var raw = input.value.trim();
        if (!raw || !/^\d+$/.test(raw)) {
          setError('Invalid Decal ID');
          return;
        }
        setLoading(true);
        fetch('/api/convert?id=' + raw)
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            if (data.imageId) {
              setResult(data.imageId);
            } else {
              setError(data.error || 'An unexpected error occurred');
            }
          })
          .catch(function () {
            setError('Network error \u2014 check your connection');
          })
          .finally(function () {
            setLoading(false);
          });
      });

      document.addEventListener('DOMContentLoaded', function () {
        card.classList.add('is-visible');
        about.classList.add('is-visible');
      });
    })();
  </script>
</body>

</html>
