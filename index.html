<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>decImg</title>
  <meta name="description" content="Convert Roblox Decal IDs to Image IDs instantly.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="google-site-verification" content="47jdk9JS_UyE9SH9ObMulmFUPW1kL2m2HmHkgv5gK3A" />
  <meta property="og:title" content="decImg">
  <meta property="og:description" content="Convert Roblox Decal IDs to Image IDs instantly.">
  <meta property="og:url" content="https://decimg.pages.dev">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://decimg.pages.dev/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: #1a1a1a;
      --border-hover: #2a2a2a;
      --text-primary: #f0f0f0;
      --text-muted: #3a3a3a;
      --text-subtle: #555;
      --error: #ff4d4d;
      --error-dim: rgba(255, 77, 77, 0.08);
      --radius: 8px;
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 2.5rem 2.5rem 1.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.05s,
        transform 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.05s;
    }

    .card.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .wordmark {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }

    .input {
      display: block;
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text-primary);
      caret-color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      user-select: text;
    }

    .input::placeholder {
      color: var(--text-muted);
    }

    .input:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
    }

    .input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.85rem;
      background: transparent;
      color: var(--text-primary);
      font-family: inherit;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition),
        border-color var(--transition),
        transform var(--transition),
        opacity var(--transition);
    }

    .btn:hover:not(:disabled) {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.04);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.985);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .result-area {
      display: none;
      margin-top: 1.25rem;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity 0.22s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .result-area.is-active {
      display: block;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .result-success {
      display: none;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
    }

    .result-success.is-visible {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-success-inner {
      min-width: 0;
    }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--text-subtle);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .result-id {
      font-size: 1rem;
      font-weight: 700;
      word-break: break-all;
      user-select: text;
    }

    .copy-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.4rem;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .copy-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--text-subtle);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke var(--transition);
    }

    .copy-btn:hover svg {
      stroke: var(--text-primary);
    }

    .copy-btn .icon-check {
      display: none;
    }

    .copy-btn.is-copied .icon-clip {
      display: none;
    }

    .copy-btn.is-copied .icon-check {
      display: block;
      stroke: var(--text-primary);
    }

    .result-error {
      display: none;
      background: var(--error-dim);
      border: 1px solid rgba(255, 77, 77, 0.15);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
      font-size: 0.82rem;
      color: var(--error);
    }

    .result-error.is-visible {
      display: block;
    }

    .about {
      max-width: 460px;
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--text-subtle);
      line-height: 1.7;
      text-align: center;
      opacity: 0;
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1) 0.2s;
    }

    .about.is-visible {
      opacity: 1;
    }

    .github-link {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 10;
      display: block;
      line-height: 0;
    }

    .github-link svg {
      fill: var(--text-subtle);
      transition: fill var(--transition);
    }

    .github-link:hover svg {
      fill: var(--text-primary);
    }

    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }

      .card {
        padding: 1.5rem 1.5rem 1.25rem;
      }

      .divider {
        margin: 1.25rem 0;
      }

      .about {
        margin-top: 1.5rem;
      }

      .github-link {
        bottom: 1rem;
        right: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="card" id="card">
    <div class="wordmark">decImg</div>
    <hr class="divider">
    <form id="form">
      <input type="text" class="input" id="decal-input" placeholder="Decal ID" autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false">
      <button type="submit" class="btn" id="convert-btn">convert</button>
    </form>
    <div class="result-area" id="result-area" aria-live="polite">
      <div class="result-success" id="result-success">
        <div class="result-success-inner">
          <div class="result-label">Image ID</div>
          <div class="result-id" id="result-id"></div>
        </div>
        <button type="button" class="copy-btn" id="copy-btn">
          <svg class="icon-clip" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          <svg class="icon-check" viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </button>
      </div>
      <div class="result-error" id="result-error"></div>
    </div>
  </div>
  <p class="about" id="about">Paste a Roblox Decal ID and get back the underlying Image ID. Useful for scripting, asset
    pipelines, or just figuring out what's behind a decal.</p>
  <a class="github-link" href="https://github.com/gmc6/decImg" target="_blank" rel="noopener noreferrer"><svg width="20"
      height="20" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
      <path fill-rule="evenodd" clip-rule="evenodd"
        d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" />
    </svg></a>
  <script>
    (function () {
      var card = document.getElementById('card');
      var about = document.getElementById('about');
      var form = document.getElementById('form');
      var input = document.getElementById('decal-input');
      var btn = document.getElementById('convert-btn');
      var resultArea = document.getElementById('result-area');
      var resultSuccess = document.getElementById('result-success');
      var resultId = document.getElementById('result-id');
      var resultError = document.getElementById('result-error');
      var copyBtn = document.getElementById('copy-btn');
      var copyTimer;
      var ellipsisTimer;
      var dotCount = 0;

      function setLoading(active) {
        input.disabled = active;
        btn.disabled = active;
        if (active) {
          resetResult();
          dotCount = 0;
          btn.textContent = 'converting';
          ellipsisTimer = setInterval(function () {
            dotCount = (dotCount + 1) % 4;
            btn.textContent = 'converting' + '.'.repeat(dotCount);
          }, 320);
        } else {
          clearInterval(ellipsisTimer);
          btn.textContent = 'convert';
        }
      }

      function revealResult() {
        resultArea.style.display = 'block';
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            resultArea.classList.add('is-active');
          });
        });
      }

      function resetResult() {
        resultArea.classList.remove('is-active');
        resultArea.style.display = '';
        resultSuccess.classList.remove('is-visible');
        resultError.classList.remove('is-visible');
      }

      function setResult(id) {
        resultId.textContent = id;
        resultSuccess.classList.add('is-visible');
        resultError.classList.remove('is-visible');
        revealResult();
      }

      function setError(msg) {
        resultError.textContent = msg;
        resultError.classList.add('is-visible');
        resultSuccess.classList.remove('is-visible');
        revealResult();
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
          var textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy') ? resolve() : reject();
          } catch (err) {
            reject(err);
          } finally {
            document.body.removeChild(textarea);
          }
        });
      }

      copyBtn.addEventListener('click', function () {
        var text = resultId.textContent;
        if (!text) return;
        copyToClipboard(text).then(function () {
          clearTimeout(copyTimer);
          copyBtn.classList.add('is-copied');
          copyTimer = setTimeout(function () {
            copyBtn.classList.remove('is-copied');
          }, 1600);
        });
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var value = input.value.trim();
        if (!value || !/^\d+$/.test(value)) {
          setError('Invalid Decal ID');
          return;
        }
        setLoading(true);
        fetch('/api/convert?id=' + value)
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.imageId) {
              setResult(data.imageId);
            } else {
              setError(data.error || 'An unexpected error occurred');
            }
          })
          .catch(function () {
            setError('Network error \u2014 check your connection');
          })
          .finally(function () {
            setLoading(false);
          });
      });

      card.classList.add('is-visible');
      about.classList.add('is-visible');
    })();
  </script>
</body>

</html>
