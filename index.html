<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>decImg</title>
  <meta name="description" content="Convert Roblox Decal IDs to Image IDs instantly.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="google-site-verification" content="47jdk9JS_UyE9SH9ObMulmFUPW1kL2m2HmHkgv5gK3A" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html,
    body {
      height: 100%;
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    .wordmark {
      text-align: center;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.3em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .card {
      background: #111111;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 24px;
    }

    .input {
      display: block;
      width: 100%;
      padding: 14px 16px;
      background: #161616;
      border: 1px solid #222;
      border-radius: 6px;
      color: #e8e8e8;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.15s;
      user-select: text;
    }

    .input::placeholder {
      color: #555;
    }

    .input:focus {
      border-color: #4d9fff;
    }

    .input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 16px;
      margin-top: 12px;
      background: #4d9fff;
      border: 1px solid #4d9fff;
      border-radius: 6px;
      color: #000;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }

    .btn:hover:not(:disabled) {
      filter: brightness(1.15);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-text-idle,
    .btn-text-loading {
      pointer-events: none;
    }

    .btn-text-loading {
      display: none;
    }

    .is-loading .btn-text-idle {
      display: none;
    }

    .is-loading .btn-text-loading {
      display: inline;
    }

    @keyframes ellipsis {
      0% {
        content: '';
      }

      25% {
        content: '.';
      }

      50% {
        content: '..';
      }

      75% {
        content: '...';
      }
    }

    .dots::after {
      content: '';
      animation: ellipsis 1.2s steps(1) infinite;
    }

    .result {
      display: none;
      margin-top: 16px;
    }

    .has-result .result,
    .has-error .result {
      display: block;
    }

    .result-success {
      display: none;
    }

    .has-result .result-success {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #161616;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 12px 16px;
    }

    .result-id {
      flex: 1;
      color: #4d9fff;
      font-weight: 500;
      font-size: 15px;
      word-break: break-all;
      min-width: 0;
      user-select: text;
    }

    .copy-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e8e8e8;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .copy-btn:hover {
      border-color: #4d9fff;
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .copy-icon-check,
    .copy-label-copied {
      display: none;
    }

    .copy-btn.is-copied .copy-icon-clip {
      display: none;
    }

    .copy-btn.is-copied .copy-icon-check {
      display: block;
    }

    .copy-btn.is-copied .copy-label-copy {
      display: none;
    }

    .copy-btn.is-copied .copy-label-copied {
      display: inline;
    }

    .result-error {
      display: none;
      color: #ff4d4d;
      font-size: 13px;
      font-weight: 400;
    }

    .has-error .result-error {
      display: block;
    }

    .has-error .result-success {
      display: none;
    }

    .about {
      max-width: 480px;
      margin: 24px auto 0;
      color: #555;
      font-size: 0.75rem;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <div class="wordmark">decImg</div>
    <div class="card">
      <form id="form">
        <input type="text" class="input" id="decal-input" placeholder="Decal ID" autocomplete="off" spellcheck="false">
        <button type="submit" class="btn" id="convert-btn">
          <span class="btn-text-idle">Convert</span>
          <span class="btn-text-loading">Converting<span class="dots"></span></span>
        </button>
      </form>
      <div class="result" aria-live="polite">
        <div class="result-success">
          <span class="result-id" id="result-id"></span>
          <button type="button" class="copy-btn" id="copy-btn">
            <svg class="copy-icon-clip" viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
            <svg class="copy-icon-check" viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12" />
            </svg>
            <span class="copy-label-copy">Copy</span>
            <span class="copy-label-copied">Copied</span>
          </button>
        </div>
        <div class="result-error" id="result-error"></div>
      </div>
    </div>
    <p class="about">Paste a Roblox Decal ID and get back the underlying Image ID. Useful for scripting, asset
      pipelines, or just figuring out what's behind a decal.</p>
  </div>
  <script>
    (function () {
      var app = document.getElementById('app');
      var form = document.getElementById('form');
      var input = document.getElementById('decal-input');
      var btn = document.getElementById('convert-btn');
      var resultId = document.getElementById('result-id');
      var resultError = document.getElementById('result-error');
      var copyBtn = document.getElementById('copy-btn');
      var copyTimeout;

      function setState(s) {
        app.classList.remove('is-loading', 'has-result', 'has-error');
        if (s) app.classList.add(s);
        var loading = s === 'is-loading';
        input.disabled = loading;
        btn.disabled = loading;
      }

      function showResult(id) {
        resultId.textContent = id;
        setState('has-result');
      }

      function showError(msg) {
        resultError.textContent = msg;
        setState('has-error');
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand('copy') ? resolve() : reject();
          } catch (e) {
            reject(e);
          } finally {
            document.body.removeChild(ta);
          }
        });
      }

      copyBtn.addEventListener('click', function () {
        var text = resultId.textContent;
        if (!text) return;
        copyToClipboard(text).then(function () {
          clearTimeout(copyTimeout);
          copyBtn.classList.add('is-copied');
          copyTimeout = setTimeout(function () {
            copyBtn.classList.remove('is-copied');
          }, 1500);
        });
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var raw = input.value.trim();
        if (!raw || !/^\d+$/.test(raw)) {
          showError('Invalid Decal ID');
          return;
        }
        setState('is-loading');
        fetch('/api/convert?id=' + raw)
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            if (data.imageId) {
              showResult(data.imageId);
            } else {
              showError(data.error || 'An unexpected error occurred');
            }
          })
          .catch(function () {
            showError('An unexpected error occurred');
          })
          .finally(function () {
            if (app.classList.contains('is-loading')) setState(null);
          });
      });
    })();
  </script>
</body>

</html>
